<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoSender Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#f0f5fe;
}

:root{
--royal:#4169E1;
--royal-dark:#1e3f9e;
}

.btn{
background:var(--royal);
color:white;
padding:10px 18px;
border-radius:10px;
font-weight:700;
}

.card{
background:white;
padding:25px;
border-radius:20px;
border:2px solid rgba(65,105,225,0.2);
}

</style>
</head>

<body>

<!-- LOGIN SCREEN -->

<div id="login-screen" class="fixed inset-0 flex items-center justify-center bg-[#f0f5fe] z-50">

<div class="card text-center w-[350px]">

<h2 class="text-2xl font-black mb-6">AutoSender Admin</h2>

<input
id="password-input"
type="password"
placeholder="Enter password"
class="w-full border-2 border-gray-200 rounded-xl p-3 mb-4"
/>

<button onclick="checkPassword()" class="btn w-full">
Login
</button>

<p id="login-error" class="text-red-500 text-sm mt-3 hidden">
Wrong password
</p>

</div>

</div>

<!-- DASHBOARD -->

<div id="dashboard" class="hidden">

<nav class="bg-white shadow p-4 flex justify-between">

<h1 class="font-black text-xl">
AutoSender <span style="color:#4169E1">PRO</span>
</h1>

<button onclick="logout()" class="btn">
Logout
</button>

</nav>


<div class="max-w-6xl mx-auto p-8">

<h2 class="text-3xl font-black mb-6">
User Management
</h2>

<input
id="user-search"
placeholder="Search phone"
class="border p-3 rounded-xl mb-6 w-full"
/>

<div id="user-cards" class="grid md:grid-cols-3 gap-6"></div>

</div>

</div>


<script>

/* ===========================
PASSWORD SYSTEM
=========================== */

const ADMIN_PASSWORD="autosender123"

function checkPassword(){

let pwd=document.getElementById("password-input").value

if(pwd===ADMIN_PASSWORD){

localStorage.setItem("admin_login","true")

document.getElementById("login-screen").style.display="none"

document.getElementById("dashboard").classList.remove("hidden")

fetchUsers()

}else{

document.getElementById("login-error").classList.remove("hidden")

}

}

function logout(){

localStorage.removeItem("admin_login")

location.reload()

}

if(localStorage.getItem("admin_login")==="true"){

document.getElementById("login-screen").style.display="none"

document.getElementById("dashboard").classList.remove("hidden")

}


/* ===========================
API
=========================== */

const API_URL="https://tests2.up.railway.app"

let allUsers=[]


async function fetchUsers(){

try{

let res=await fetch(`${API_URL}/users`)

let data=await res.json()

allUsers=data

renderUsers()

}catch(e){

console.log(e)

}

}


function renderUsers(){

let container=document.getElementById("user-cards")

container.innerHTML=""

allUsers.forEach(u=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=`

<div class="text-lg font-bold mb-3">${u.phone}</div>

<select id="plan-${u.phone}" class="border rounded p-2 w-full mb-3">

<option value="30">Monthly</option>
<option value="90">Quarterly</option>
<option value="365">Annual</option>

</select>

<div class="flex gap-2">

<button onclick="activate('${u.phone}')" class="btn flex-1">
Update
</button>

<button onclick="suspend('${u.phone}')" class="btn flex-1 bg-yellow-500">
Suspend
</button>

</div>

<button onclick="deleteUser('${u.phone}')" class="mt-3 text-red-500 text-sm">
Delete
</button>

`

container.appendChild(card)

})

}


/* ===========================
USER ACTIONS
=========================== */

async function activate(phone){

let days=document.getElementById(`plan-${phone}`).value

await fetch(`${API_URL}/status/${phone}`,{

method:"PUT",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({

isPaid:true,
isSuspended:false,
daysToAdd:parseInt(days)

})

})

fetchUsers()

}


async function suspend(phone){

await fetch(`${API_URL}/status/${phone}`,{

method:"PUT",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({

isSuspended:true

})

})

fetchUsers()

}


async function deleteUser(phone){

if(!confirm("Delete user?")) return

await fetch(`${API_URL}/users/${phone}`,{

method:"DELETE"

})

fetchUsers()

}


/* ===========================
SEARCH
=========================== */

document.getElementById("user-search").addEventListener("keyup",function(){

let q=this.value.toLowerCase()

document.querySelectorAll("#user-cards .card").forEach(card=>{

card.style.display=card.innerText.toLowerCase().includes(q)?"block":"none"

})

})


</script>

</body>
</html>
