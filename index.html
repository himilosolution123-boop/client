<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AutoSender Pro · Secure Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --royal: #1E3A8A; --bg-light: #F8FAFE; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: var(--bg-light); }
        .nav-link { padding: 0.5rem 1.4rem; border-radius: 40px; font-weight: 700; color: #43567A; transition: 0.2s; }
        .nav-link.active { background: var(--royal); color: white; box-shadow: 0 8px 16px -8px var(--royal); }
        .user-card { background: white; border-radius: 36px; border: 2px solid rgba(30, 58, 138, 0.1); padding: 2rem 1.5rem; text-align: center; transition: all 0.25s; }
        .user-card:hover { transform: translateY(-4px); border-color: var(--royal); box-shadow: 0 20px 30px -15px rgba(30, 58, 138, 0.2); }
        .status-pill { display: inline-block; padding: 8px 20px; border-radius: 60px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; }
    </style>
</head>
<body class="antialiased">

    <!-- LOGIN OVERLAY -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-md rounded-[40px] p-12 shadow-2xl">
            <div class="text-center mb-10">
                <div class="bg-blue-600 w-20 h-20 rounded-3xl mx-auto mb-6 flex items-center justify-center shadow-xl">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h1 class="text-3xl font-black text-slate-900">Admin Portal</h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-3">Secure Mobile Ecosystem</p>
            </div>
            <div class="space-y-5">
                <input type="text" id="admin-user" placeholder="Username" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-blue-600 outline-none transition-all font-bold text-slate-700">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl px-6 py-4 focus:border-blue-600 outline-none transition-all font-bold text-slate-700">
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all active:scale-95 text-sm uppercase tracking-widest">Verify Identity</button>
            </div>
            <p id="login-error" class="text-red-500 text-center text-xs font-black mt-8 hidden">ACCESS DENIED: INVALID CREDENTIALS</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-content" class="hidden">
        <nav class="bg-white/80 backdrop-blur-md sticky top-0 z-50 px-8 py-4 flex items-center justify-between border-b border-slate-100 shadow-sm">
            <span class="text-xl font-black tracking-tighter">AutoSender<span class="text-blue-600">PRO</span></span>
            <div class="flex items-center space-x-2">
                <button id="tab-home" onclick="switchTab('home')" class="nav-link active">Home</button>
                <button id="tab-management" onclick="switchTab('management')" class="nav-link">Management</button>
                <button onclick="handleLogout()" class="ml-4 text-slate-300 hover:text-red-500 transition font-black text-[10px] uppercase">Sign Out</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-10">
            <section id="section-home">
                <div class="flex items-center justify-between mb-12">
                    <h2 class="text-4xl font-black text-slate-900 tracking-tighter">System Health</h2>
                    <div id="conn-status" class="px-4 py-2 rounded-full bg-emerald-50 border border-emerald-100 flex items-center space-x-2">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-black text-emerald-700 uppercase">Live</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8" id="stats-grid">
                    <div class="bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm text-center">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">Total Nodes</p>
                        <p id="stat-total" class="text-5xl font-black text-slate-900">0</p>
                    </div>
                    <div class="bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm text-center">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">Active</p>
                        <p id="stat-active" class="text-5xl font-black text-emerald-500">0</p>
                    </div>
                    <div class="bg-white p-10 rounded-[40px] border border-slate-100 shadow-sm text-center">
                        <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2">Suspended</p>
                        <p id="stat-suspended" class="text-5xl font-black text-amber-500">0</p>
                    </div>
                </div>
            </section>

            <section id="section-management" class="hidden">
                <div class="flex items-center justify-between mb-10">
                    <h2 class="text-4xl font-black text-slate-900 tracking-tighter">Node Control</h2>
                    <input type="text" id="search" onkeyup="filter()" placeholder="Quick Search..." class="bg-white border border-slate-200 rounded-2xl px-6 py-3 text-sm font-bold outline-none focus:border-blue-600">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8" id="user-cards"></div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = 'https://tests2.up.railway.app';
        let adminToken = sessionStorage.getItem('admin_token');

        if (adminToken) showDashboard();

        async function handleLogin() {
            const username = document.getElementById('admin-user').value;
            const password = document.getElementById('admin-pass').value;
            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    adminToken = data.token;
                    sessionStorage.setItem('admin_token', adminToken);
                    showDashboard();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (e) { alert('Server Unavailable'); }
        }

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            refresh();
        }

        function handleLogout() { sessionStorage.clear(); location.reload(); }

        async function refresh() {
            try {
                const res = await fetch(`${API_URL}/status/analytics`, { headers: { 'x-admin-key': adminToken }});
                const data = await res.json();
                document.getElementById('stat-total').innerText = data.totalUsers || 0;
                document.getElementById('stat-active').innerText = data.activeUsers || 0;
                document.getElementById('stat-suspended').innerText = data.suspendedUsers || 0;

                const uRes = await fetch(`${API_URL}/users`, { headers: { 'x-admin-key': adminToken }});
                const users = await uRes.json();
                renderCards(users);
            } catch (e) { console.error(e); }
        }

        function renderCards(users) {
            const container = document.getElementById('user-cards');
            container.innerHTML = users.map(u => `
                <div class="user-card" data-phone="${u.phone}">
                    <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white font-black text-xl shadow-lg">${u.phone.substring(0,2)}</div>
                    <p class="font-black text-slate-800 text-lg mb-2">${u.phone}</p>
                    <div id="badge-${u.phone}" class="status-pill bg-slate-50 text-slate-400">Syncing...</div>
                    <div class="mt-8 flex flex-col space-y-3">
                        <select id="plan-${u.phone}" class="w-full bg-slate-50 border border-slate-100 rounded-xl px-4 py-3 text-xs font-black">
                            <option value="30">Monthly</option><option value="365">Annual</option>
                        </select>
                        <button onclick="updateUser('${u.phone}')" class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black uppercase tracking-widest">Update Node</button>
                        <button onclick="deleteUser('${u.phone}')" class="w-full text-red-500 py-2 text-[10px] font-black uppercase">Decommission</button>
                    </div>
                </div>
            `).join('');
            users.forEach(u => fetchStatus(u.phone));
        }

        async function fetchStatus(phone) {
            const res = await fetch(`${API_URL}/status/${phone}`);
            const data = await res.json();
            const badge = document.getElementById(`badge-${phone}`);
            if (data.isSuspended) { badge.className = "status-pill bg-amber-50 text-amber-600 border border-amber-100"; badge.innerText = "Suspended"; }
            else if (data.isActive) { badge.className = "status-pill bg-emerald-50 text-emerald-600 border border-emerald-100"; badge.innerText = `Active (${data.daysRemaining}d)`; }
            else { badge.className = "status-pill bg-rose-50 text-red-600 border border-rose-100"; badge.innerText = "Expired"; }
        }

        async function updateUser(phone) {
            const days = document.getElementById(`plan-${phone}`).value;
            await fetch(`${API_URL}/status/${phone}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'x-admin-key': adminToken },
                body: JSON.stringify({ isPaid: true, isSuspended: false, daysToAdd: parseInt(days) })
            });
            refresh();
        }

        async function deleteUser(phone) {
            if (!confirm('Permanent Action?')) return;
            await fetch(`${API_URL}/users/${phone}`, { method: 'DELETE', headers: { 'x-admin-key': adminToken }});
            refresh();
        }

        function switchTab(tab) {
            document.getElementById('section-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('section-management').classList.toggle('hidden', tab !== 'management');
            document.getElementById('tab-home').classList.toggle('active', tab === 'home');
            document.getElementById('tab-management').classList.toggle('active', tab === 'management');
        }

        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => c.classList.toggle('hidden', !c.dataset.phone.includes(q)));
        }

        setInterval(refresh, 60000);
    </script>
</body>
</html>
