<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>AutoSender Pro · Royal Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --royal: #1E3A8A; --royal-light: #3B5BA5; --royal-glow: rgba(30, 58, 138, 0.2); --bg-light: #F0F5FF; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(30, 58, 138, 0.03) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(30, 58, 138, 0.04) 0%, transparent 40%),
                        var(--bg-light);
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><circle cx="30" cy="30" r="8" fill="%231E3A8A" fill-opacity="0.02"/></svg>');
            opacity: 0.5;
            z-index: -1;
        }

        .nav-link {
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            font-weight: 700;
            color: #2C3E5A;
            transition: all 0.2s ease;
            backdrop-filter: blur(4px);
        }
        .nav-link.active {
            background: var(--royal);
            color: white;
            box-shadow: 0 10px 20px -8px var(--royal);
        }
        .nav-link:not(.active):hover {
            background: rgba(30, 58, 138, 0.08);
            color: var(--royal);
        }

        .glass-nav {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(30, 58, 138, 0.15);
        }

        .stat-card {
            background: white;
            border-radius: 40px;
            padding: 2rem 1.5rem;
            box-shadow: 0 20px 35px -15px rgba(30, 58, 138, 0.15);
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1), box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.6);
            position: relative;
            overflow: hidden;
        }
        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(135deg, var(--royal), #4F7DF3);
        }
        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 30px 45px -15px rgba(30, 58, 138, 0.3);
        }

        /* User card with centered content & avatar */
        .user-card {
            background: white;
            border-radius: 40px;
            border: 2px solid rgba(30, 58, 138, 0.08);
            padding: 2rem 1.5rem 2rem 1.5rem;
            transition: all 0.3s cubic-bezier(0.2,0.9,0.3,1);
            box-shadow: 0 15px 30px -15px rgba(30,58,138,0.1);
            position: relative;
            backdrop-filter: blur(2px);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .user-card:hover {
            transform: translateY(-6px) scale(1.02);
            border-color: var(--royal);
            box-shadow: 0 30px 40px -15px var(--royal-glow);
        }
        .user-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 40px;
            padding: 2px;
            background: linear-gradient(145deg, rgba(30,58,138,0.2), transparent 60%);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        /* Avatar circle with icon */
        .avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #1E3A8A, #3B5BA5);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem auto;
            box-shadow: 0 15px 20px -10px rgba(30,58,138,0.4);
            transition: transform 0.2s;
        }
        .avatar svg {
            width: 44px;
            height: 44px;
            color: white;
            stroke-width: 1.8;
        }
        .user-card:hover .avatar {
            transform: scale(1.02);
        }

        .status-pill {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 60px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            box-shadow: 0 2px 6px rgba(0,0,0,0.02);
            margin-bottom: 1rem;
        }

        button {
            transition: all 0.2s ease;
        }
        button:active { transform: scale(0.96); }

        .live-dot {
            box-shadow: 0 0 0 rgba(16, 185, 129, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); } 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); } }

        #login-overlay {
            backdrop-filter: blur(8px);
        }

        .login-card {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #E8F0FE; }
        ::-webkit-scrollbar-thumb { background: var(--royal); border-radius: 20px; }

        @media (max-width: 640px) {
            .nav-link { padding: 0.4rem 1rem; font-size: 0.8rem; }
            .user-card { padding: 1.5rem 1rem; }
            .avatar { width: 70px; height: 70px; }
            .avatar svg { width: 38px; height: 38px; }
        }
    </style>
</head>
<body class="antialiased">

    <!-- LOGIN OVERLAY (royal with floating effect) -->
    <div id="login-overlay" class="fixed inset-0 z-[100] bg-[#1E3A8A]/90 flex items-center justify-center p-4">
        <div class="login-card bg-white w-full max-w-md rounded-[48px] p-8 md:p-12 shadow-2xl border border-white/30 relative overflow-hidden">
            <div class="absolute -top-20 -right-20 w-60 h-60 bg-[#1E3A8A]/5 rounded-full blur-3xl"></div>
            <div class="absolute -bottom-20 -left-20 w-60 h-60 bg-[#1E3A8A]/5 rounded-full blur-3xl"></div>
            <div class="text-center mb-8 relative">
                <div class="bg-[#1E3A8A] w-20 h-20 rounded-3xl mx-auto mb-5 flex items-center justify-center shadow-xl shadow-[#1E3A8A]/30">
                    <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
                </div>
                <h1 class="text-3xl font-black text-slate-900">Admin Portal</h1>
                <p class="text-slate-400 font-bold text-xs uppercase tracking-widest mt-2">Royal secure access</p>
            </div>
            <div class="space-y-4 relative">
                <input type="text" id="admin-user" placeholder="Username" class="w-full bg-slate-50/80 border-2 border-slate-200 rounded-2xl px-6 py-4 focus:border-[#1E3A8A] outline-none transition-all font-bold text-slate-700 backdrop-blur-sm">
                <input type="password" id="admin-pass" placeholder="Password" class="w-full bg-slate-50/80 border-2 border-slate-200 rounded-2xl px-6 py-4 focus:border-[#1E3A8A] outline-none transition-all font-bold text-slate-700 backdrop-blur-sm">
                <button onclick="handleLogin()" class="w-full bg-[#1E3A8A] hover:bg-[#0f2b5e] text-white font-black py-5 rounded-2xl shadow-xl shadow-[#1E3A8A]/30 transition-all active:scale-95 text-sm uppercase tracking-widest relative overflow-hidden group">
                    <span class="relative z-10">Verify Identity</span>
                    <span class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></span>
                </button>
            </div>
            <p id="login-error" class="text-red-500 text-center text-xs font-black mt-6 hidden">ACCESS DENIED · INVALID CREDENTIALS</p>
        </div>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-content" class="hidden relative">
        <!-- background floating orbs -->
        <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
            <div class="absolute -top-40 -right-40 w-96 h-96 bg-[#1E3A8A]/5 rounded-full blur-3xl"></div>
            <div class="absolute top-1/2 left-0 w-72 h-72 bg-[#1E3A8A]/5 rounded-full blur-3xl"></div>
            <div class="absolute bottom-0 right-20 w-80 h-80 bg-[#1E3A8A]/5 rounded-full blur-3xl"></div>
        </div>

        <!-- Glass navigation -->
        <nav class="glass-nav sticky top-0 z-50 px-4 sm:px-6 py-3 flex items-center justify-between border-b border-[#1E3A8A]/10 flex-wrap gap-2 relative">
            <span class="text-lg sm:text-xl font-black tracking-tighter text-slate-800">AutoSender<span class="text-[#1E3A8A]">PRO</span></span>
            <div class="flex items-center space-x-1 sm:space-x-2 flex-wrap justify-end">
                <button id="tab-home" onclick="switchTab('home')" class="nav-link active">🏠 Home</button>
                <button id="tab-management" onclick="switchTab('management')" class="nav-link">📋 Management</button>
                <button onclick="handleLogout()" class="ml-2 text-slate-400 hover:text-red-500 transition font-black text-[9px] sm:text-[10px] uppercase border-l pl-3 border-slate-200 flex items-center gap-1">🔓 Sign Out</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 sm:py-10 relative z-10">
            <!-- HOME SECTION -->
            <section id="section-home">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8 sm:mb-12">
                    <h2 class="text-3xl sm:text-4xl font-black text-slate-900 tracking-tighter flex items-center gap-3">
                        <span class="bg-[#1E3A8A] w-2 h-8 rounded-full"></span>
                        System Health
                    </h2>
                    <div id="conn-status" class="px-5 py-2.5 rounded-full bg-white/70 backdrop-blur-sm border border-emerald-200 flex items-center space-x-3 shadow-sm self-start">
                        <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full live-dot"></div>
                        <span class="text-[10px] font-black text-emerald-700 uppercase tracking-wider">Live · Real-time</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 sm:gap-6 lg:gap-8" id="stats-grid">
                    <div class="stat-card">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Total Nodes</p>
                                <p id="stat-total" class="text-5xl sm:text-6xl font-black text-slate-900">0</p>
                            </div>
                            <div class="w-12 h-12 bg-[#1E3A8A]/10 rounded-2xl flex items-center justify-center text-[#1E3A8A] text-xl">📊</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Active</p>
                                <p id="stat-active" class="text-5xl sm:text-6xl font-black text-emerald-500">0</p>
                            </div>
                            <div class="w-12 h-12 bg-emerald-50 rounded-2xl flex items-center justify-center text-emerald-500 text-xl">✅</div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="flex justify-between items-start">
                            <div>
                                <p class="text-[11px] font-black text-slate-400 uppercase tracking-widest mb-1">Suspended</p>
                                <p id="stat-suspended" class="text-5xl sm:text-6xl font-black text-amber-500">0</p>
                            </div>
                            <div class="w-12 h-12 bg-amber-50 rounded-2xl flex items-center justify-center text-amber-500 text-xl">⛔</div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- MANAGEMENT SECTION -->
            <section id="section-management" class="hidden">
                <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-6 sm:mb-8">
                    <h2 class="text-3xl sm:text-4xl font-black text-slate-900 tracking-tighter flex items-center gap-3">
                        <span class="bg-[#1E3A8A] w-2 h-8 rounded-full"></span>
                        Node Control
                    </h2>
                    <div class="relative w-full sm:w-auto">
                        <input type="text" id="search" onkeyup="filter()" placeholder="🔍 Quick Search..." class="w-full sm:w-64 bg-white/80 backdrop-blur-sm border border-slate-200 rounded-2xl px-5 py-3 pl-11 text-sm font-bold outline-none focus:border-[#1E3A8A] transition-all">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">🔎</span>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5 sm:gap-6 lg:gap-8" id="user-cards"></div>
            </section>
        </main>
    </div>

    <script>
        const API_URL = 'https://tests2.up.railway.app';
        let adminToken = sessionStorage.getItem('admin_token');

        if (adminToken) showDashboard();

        // --- LOGIN ---
        async function handleLogin() {
            const username = document.getElementById('admin-user').value;
            const password = document.getElementById('admin-pass').value;
            try {
                const res = await fetch(`${API_URL}/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                if (res.ok) {
                    const data = await res.json();
                    adminToken = data.token;
                    sessionStorage.setItem('admin_token', adminToken);
                    showDashboard();
                } else {
                    document.getElementById('login-error').classList.remove('hidden');
                }
            } catch (e) { alert('Server Unavailable'); }
        }

        function showDashboard() {
            document.getElementById('login-overlay').classList.add('hidden');
            document.getElementById('dashboard-content').classList.remove('hidden');
            refresh();
        }

        function handleLogout() { sessionStorage.clear(); location.reload(); }

        // --- REFRESH DASHBOARD ---
        async function refresh() {
            try {
                const res = await fetch(`${API_URL}/status/analytics`, { headers: { 'x-admin-key': adminToken }});
                const data = await res.json();
                document.getElementById('stat-total').innerText = data.totalUsers || 0;
                document.getElementById('stat-active').innerText = data.activeUsers || 0;
                document.getElementById('stat-suspended').innerText = data.suspendedUsers || 0;

                const uRes = await fetch(`${API_URL}/users`, { headers: { 'x-admin-key': adminToken }});
                const users = await uRes.json();
                renderCards(users);
            } catch (e) { console.error(e); }
        }

        // --- RENDER USER CARDS with AVATAR and CENTERED CONTENT ---
        function renderCards(users) {
            const container = document.getElementById('user-cards');
            container.innerHTML = users.map(u => `
                <div class="user-card" data-phone="${u.phone}">
                    <!-- Avatar icon (centered) -->
                    <div class="avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                            <circle cx="12" cy="7" r="4" />
                        </svg>
                    </div>
                    <!-- Phone number -->
                    <p class="font-black text-slate-800 text-base sm:text-lg mb-3 break-all">${u.phone}</p>
                    <!-- Dynamic status badge -->
                    <div id="badge-${u.phone}" class="status-pill bg-slate-50 text-slate-400">⏳ Syncing...</div>
                    
                    <!-- Controls container (centered but buttons full width) -->
                    <div class="w-full mt-4 flex flex-col space-y-3">
                        <!-- Plan selector with icon -->
                        <div class="relative w-full">
                            <select id="plan-${u.phone}" class="w-full appearance-none bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-xs font-black focus:border-[#1E3A8A] outline-none">
                                <option value="30">📅 Monthly (30d)</option>
                                <option value="365">🎯 Annual (365d)</option>
                            </select>
                            <span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">▼</span>
                        </div>

                        <!-- Row 1: Update & Suspend -->
                        <div class="grid grid-cols-2 gap-2 w-full">
                            <button onclick="updateUser('${u.phone}')" class="bg-slate-900 hover:bg-slate-800 text-white py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition flex items-center justify-center gap-1 shadow-md hover:shadow-lg">⟳ Update</button>
                            <button onclick="suspendUser('${u.phone}')" class="bg-amber-500 hover:bg-amber-600 text-white py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition flex items-center justify-center gap-1 shadow-md hover:shadow-lg">⛔ Suspend</button>
                        </div>

                        <!-- Row 2: Authorize & Decommission -->
                        <div class="grid grid-cols-2 gap-2 w-full">
                            <button onclick="authorizeUser('${u.phone}')" class="bg-[#1E3A8A] hover:bg-[#0f2b5e] text-white py-3.5 rounded-xl text-[10px] font-black uppercase tracking-widest transition flex items-center justify-center gap-1 shadow-md hover:shadow-lg">✓ Authorize</button>
                            <button onclick="deleteUser('${u.phone}')" class="bg-white border-2 border-rose-200 text-rose-600 hover:bg-rose-50 py-3 rounded-xl text-[10px] font-black uppercase transition flex items-center justify-center gap-1">🗑️ Decom</button>
                        </div>
                    </div>
                </div>
            `).join('');
            // fetch status for each user
            users.forEach(u => fetchStatus(u.phone));
        }

        // --- FETCH INDIVIDUAL STATUS ---
        async function fetchStatus(phone) {
            try {
                const res = await fetch(`${API_URL}/status/${phone}`);
                const data = await res.json();
                const badge = document.getElementById(`badge-${phone}`);
                if (data.isSuspended) { 
                    badge.className = "status-pill bg-amber-50 text-amber-600 border border-amber-200"; 
                    badge.innerText = "⛔ Suspended"; 
                }
                else if (data.isActive) { 
                    badge.className = "status-pill bg-emerald-50 text-emerald-600 border border-emerald-200"; 
                    badge.innerText = `✅ Active (${data.daysRemaining}d)`; 
                }
                else { 
                    badge.className = "status-pill bg-rose-50 text-rose-600 border border-rose-200"; 
                    badge.innerText = "⚠️ Expired"; 
                }
            } catch (e) { console.warn("status fetch fail", e); }
        }

        // --- UPDATE (activate / extend) ---
        async function updateUser(phone) {
            const days = document.getElementById(`plan-${phone}`).value;
            try {
                await fetch(`${API_URL}/status/${phone}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminToken },
                    body: JSON.stringify({ isPaid: true, isSuspended: false, daysToAdd: parseInt(days) })
                });
                refresh();
            } catch (e) { alert("Update failed"); }
        }

        // --- SUSPEND (sets suspended true, not paid) ---
        async function suspendUser(phone) {
            if (!confirm(`Suspend node ${phone}? This will mark as suspended.`)) return;
            try {
                await fetch(`${API_URL}/status/${phone}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminToken },
                    body: JSON.stringify({ isPaid: false, isSuspended: true, daysToAdd: 0 })
                });
                refresh();
            } catch (e) { alert("Suspend action failed"); }
        }

        // --- AUTHORIZE (unsuspend, keep current days) ---
        async function authorizeUser(phone) {
            if (!confirm(`Authorize (unsuspend) node ${phone}? It will be reactivated.`)) return;
            try {
                await fetch(`${API_URL}/status/${phone}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'x-admin-key': adminToken },
                    body: JSON.stringify({ isPaid: true, isSuspended: false, daysToAdd: 0 })
                });
                refresh();
            } catch (e) { alert("Authorize action failed"); }
        }

        // --- DELETE ---
        async function deleteUser(phone) {
            if (!confirm('⚠️ Permanent deletion? This cannot be undone.')) return;
            try {
                await fetch(`${API_URL}/users/${phone}`, { method: 'DELETE', headers: { 'x-admin-key': adminToken }});
                refresh();
            } catch (e) { alert("Delete failed"); }
        }

        // --- TAB SWITCHING ---
        function switchTab(tab) {
            document.getElementById('section-home').classList.toggle('hidden', tab !== 'home');
            document.getElementById('section-management').classList.toggle('hidden', tab !== 'management');
            document.getElementById('tab-home').classList.toggle('active', tab === 'home');
            document.getElementById('tab-management').classList.toggle('active', tab === 'management');
        }

        // --- FILTER CARDS ---
        function filter() {
            const q = document.getElementById('search').value.toLowerCase();
            document.querySelectorAll('.user-card').forEach(c => c.classList.toggle('hidden', !c.dataset.phone.includes(q)));
        }

        // auto refresh every 60s
        setInterval(refresh, 60000);
    </script>
</body>
</html>
